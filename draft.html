<!DOCTYPE html>
<html lang="en">
<head> <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Draft — True Oregonian Majors Pool</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0B1F3A;--navy-mid:#152D4E;--navy-light:#1E3D68;--gold:#C5A561;
  --bg:#FAF8F3;--surface:#FFFFFF;--surface-2:#F5F1E8;
  --border:#E2DDD4;--border-2:#EDE9E0;
  --text:#1A2332;--text-2:#4A5568;--muted:#7A8A9A;
  --radius:4px;--radius-lg:10px;
}
[data-theme="dark"]{
  --bg:#0D1829;--surface:#111E30;--surface-2:#152D4E;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.05);
  --text:rgba(255,255,255,.9);--text-2:rgba(255,255,255,.55);--muted:rgba(255,255,255,.3);
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* Header */
.site-header{background:var(--navy);padding:0 24px;display:flex;align-items:stretch;border-bottom:1px solid rgba(197,165,97,.2);position:sticky;top:0;z-index:200;}
.header-brand{display:flex;align-items:center;gap:14px;padding:14px 20px 14px 0;border-right:1px solid rgba(255,255,255,.06);margin-right:20px;}
.pga-seal{width:40px;height:40px;border:1.5px solid var(--gold);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.seal-pga{font-family:'Cormorant Garamond',serif;font-size:.7rem;font-weight:700;color:var(--gold);letter-spacing:.1em;line-height:1;}
.seal-line{width:18px;height:1px;background:rgba(197,165,97,.35);margin:2px 0;}
.seal-year{font-family:'DM Mono',monospace;font-size:.46rem;color:rgba(197,165,97,.55);letter-spacing:.06em;}
.pool-name{font-family:'Cormorant Garamond',serif;font-size:1.2rem;font-weight:600;color:white;line-height:1;}
.tournament-name{font-size:.65rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;font-weight:500;}
.header-nav{display:flex;align-items:stretch;margin-left:auto;}
.nav-link{display:flex;align-items:center;padding:0 18px;color:rgba(255,255,255,.38);text-decoration:none;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s;gap:6px;}
.nav-link:hover{color:rgba(255,255,255,.75);}
.nav-link.active{color:var(--gold);border-bottom-color:var(--gold);}
.dark-toggle{background:none;border:none;padding:0 16px;font-size:1rem;cursor:pointer;display:flex;align-items:center;color:rgba(255,255,255,.4);}

/* Status bar */
.draft-status{background:var(--navy-mid);padding:10px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(197,165,97,.1);}
.ds-round{font-size:.58rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.ds-clock{font-family:'Cormorant Garamond',serif;font-size:1.05rem;font-weight:600;color:white;display:flex;align-items:center;gap:8px;}
.clock-pulse{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ds-progress-label{font-size:.56rem;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px;text-align:right;}
.ds-progress-bar{width:120px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.ds-progress-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .5s;}

/* Mobile tabs */
.mobile-tabs{display:none;background:var(--navy);border-bottom:1px solid rgba(197,165,97,.15);}
.mobile-tab{flex:1;padding:12px 0;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,.35);border-bottom:2px solid transparent;margin-bottom:-1px;}
.mobile-tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Layout */
.draft-layout{display:grid;grid-template-columns:1fr 340px;gap:0;min-height:calc(100vh - 160px);}

/* Field panel */
.field-panel{border-right:1px solid var(--border);}
.search-bar{padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;display:flex;gap:10px;align-items:center;}
.search-input-wrap{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-lg);padding:8px 12px;}
.search-icon{font-size:.85rem;opacity:.4;}
.search-input{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);outline:none;}
.search-input::placeholder{color:var(--muted);}
.filter-chips{display:flex;gap:6px;padding:8px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);}
.filter-chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:5px 13px;border:1px solid var(--border);border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.65rem;font-weight:600;color:var(--muted);background:var(--bg);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--navy);border-color:var(--navy);color:var(--gold);}
.player-list{background:var(--bg);}
.tier-label{padding:8px 16px 5px;font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:104px;z-index:40;}
.player-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border-2);transition:background .1s;background:var(--surface);}
.player-row:hover{background:var(--surface-2);}
.player-row.is-picked{opacity:.4;pointer-events:none;}
.player-num{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);width:24px;text-align:center;flex-shrink:0;}
.player-info{flex:1;min-width:0;}
.player-name{font-size:.88rem;font-weight:600;color:var(--text);}
.player-detail{font-size:.64rem;color:var(--muted);margin-top:1px;}
.odds-badge{font-family:'DM Mono',monospace;font-size:.7rem;font-weight:500;padding:3px 9px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.odds-fav{background:#EEF3FF;color:var(--navy-light);}
.odds-mid{background:var(--surface-2);color:var(--text-2);}
.odds-long{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
[data-theme="dark"] .odds-fav{background:rgba(30,61,104,.5);color:#8AABDD;}
[data-theme="dark"] .odds-mid{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);}
[data-theme="dark"] .odds-long{background:transparent;color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.1);}
.pick-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.8rem;cursor:pointer;flex-shrink:0;color:var(--muted);transition:all .15s;font-weight:700;}
.pick-btn:hover{border-color:var(--navy);color:var(--navy);background:var(--surface-2);}
.pick-btn.done{background:var(--navy);border-color:var(--navy);color:var(--gold);cursor:default;}

/* Board panel */
.board-panel{background:var(--surface);display:flex;flex-direction:column;}
.board-header{padding:14px 18px 10px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between;position:sticky;top:0;z-index:50;background:var(--surface);}
.board-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:600;color:var(--navy);}
[data-theme="dark"] .board-title{color:var(--gold);}
.board-meta{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);}
.board-scroll{flex:1;overflow-y:auto;}
.board-round-label{padding:5px 18px 4px;font-size:.58rem;font-weight:700;color:rgba(197,165,97,.8);text-transform:uppercase;letter-spacing:.14em;background:var(--surface-2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);}
.board-row{display:flex;align-items:center;gap:10px;padding:8px 18px;border-bottom:1px solid var(--border-2);}
.board-row.on-clock{background:rgba(197,165,97,.06);}
.br-num{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);width:22px;flex-shrink:0;}
.br-name{font-size:.82rem;font-weight:600;color:var(--navy);width:90px;flex-shrink:0;}
[data-theme="dark"] .br-name{color:rgba(255,255,255,.8);}
.br-name.on-clock-name{color:var(--gold);}
.br-pick{flex:1;}
.br-golfer{font-size:.82rem;font-weight:500;color:var(--text);}
.br-odds{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);margin-left:5px;}
.br-empty{font-size:.75rem;color:var(--border);font-style:italic;}
.br-undo{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.7rem;padding:0 0 0 6px;opacity:.5;}
.br-undo:hover{color:#e53935;opacity:1;}
.draft-complete{padding:32px 20px;text-align:center;}
.draft-complete h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;color:var(--navy);margin-bottom:8px;}
[data-theme="dark"] .draft-complete h3{color:var(--gold);}
.draft-complete p{color:var(--muted);font-size:.88rem;margin-bottom:20px;}
.btn-primary{background:var(--navy);color:var(--gold);border:1px solid rgba(197,165,97,.25);border-radius:var(--radius);padding:11px 24px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
.panel-empty{padding:60px 24px;text-align:center;color:var(--muted);font-size:.88rem;}

/* Responsive */
@media(max-width:900px){
  .draft-layout{grid-template-columns:1fr;}
  .field-panel{border-right:none;}
  .board-panel{display:none;}
  .board-panel.show{display:flex;flex-direction:column;min-height:70vh;}
  .field-panel.hide{display:none;}
  .mobile-tabs{display:flex;}
  .draft-status{padding:10px 14px;}
  .search-bar{padding:10px 14px;}
  .filter-chips{padding:7px 14px;}
  .player-row{padding:9px 14px;}
  .tier-label{top:98px;}
  .nav-link span{display:none;}
  .site-header{padding:0 14px;}
  .header-brand{padding:12px 14px 12px 0;margin-right:12px;}
}
</style>
</head>
<body>

<div class="site-header">
  <div class="header-brand">

<script>
// Dark mode
function toggleDark(){
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',isDark?'light':'dark');
  localStorage.setItem('tomp-dark',String(!isDark));
  document.getElementById('icon-moon').style.display=isDark?'block':'none';
  document.getElementById('icon-sun').style.display=isDark?'none':'block';
}
(function(){
  const s=localStorage.getItem('tomp-dark');
  const pd=window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(s==='true'||(s===null&&pd)){
    document.documentElement.setAttribute('data-theme','dark');
    document.addEventListener('DOMContentLoaded',()=>{
      const moon=document.getElementById('icon-moon');
      const sun=document.getElementById('icon-sun');
      if(moon)moon.style.display='none';
      if(sun)sun.style.display='block';
    });
  }
})();

// Mobile tabs
function mobileTab(tab,btn){
  document.querySelectorAll('.mobile-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const fp=document.getElementById('field-panel');
  const bp=document.getElementById('board-panel');
  if(tab==='pick'){fp.classList.remove('hide');bp.classList.remove('show');}
  else{fp.classList.add('hide');bp.classList.add('show');}
}

// Supabase
const db=window.supabase.createClient(CONFIG.supabaseUrl,CONFIG.supabaseKey);

// Field
const FIELD=[
  {name:'Scottie Scheffler',  country:'🇺🇸',odds:'+480',  tier:'favorites'},
  {name:'Rory McIlroy',       country:'🇬🇧',odds:'+850',  tier:'favorites'},
  {name:'Cameron Young',      country:'🇺🇸',odds:'+1200', tier:'favorites'},
  {name:'Jon Rahm',           country:'🇪🇸',odds:'+1500', tier:'favorites'},
  {name:'Xander Schauffele',  country:'🇺🇸',odds:'+1600', tier:'favorites'},
  {name:'Ludvig Åberg',       country:'🇸🇪',odds:'+1800', tier:'favorites'},
  {name:'Bryson DeChambeau',  country:'🇺🇸',odds:'+2000', tier:'contenders'},
  {name:'Tommy Fleetwood',    country:'🇬🇧',odds:'+2500', tier:'contenders'},
  {name:'Collin Morikawa',    country:'🇺🇸',odds:'+2800', tier:'contenders'},
  {name:'Viktor Hovland',     country:'🇳🇴',odds:'+3000', tier:'contenders'},
  {name:'Patrick Cantlay',    country:'🇺🇸',odds:'+3500', tier:'contenders'},
  {name:'Russell Henley',     country:'🇺🇸',odds:'+3500', tier:'contenders'},
  {name:'Hideki Matsuyama',   country:'🇯🇵',odds:'+4000', tier:'contenders'},
  {name:'Matt Fitzpatrick',   country:'🇬🇧',odds:'+4500', tier:'contenders'},
  {name:'Brooks Koepka',      country:'🇺🇸',odds:'+5000', tier:'contenders'},
  {name:'Justin Thomas',      country:'🇺🇸',odds:'+5500', tier:'value'},
  {name:'Justin Rose',        country:'🇬🇧',odds:'+5500', tier:'value'},
  {name:'Shane Lowry',        country:'🇮🇪',odds:'+6000', tier:'value'},
  {name:'Min Woo Lee',        country:'🇦🇺',odds:'+6000', tier:'value'},
  {name:'J.J. Spaun',         country:'🇺🇸',odds:'+6600', tier:'value'},
  {name:'Akshay Bhatia',      country:'🇺🇸',odds:'+6500', tier:'value'},
  {name:'Robert MacIntyre',   country:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',odds:'+7000', tier:'value'},
  {name:'Sungjae Im',         country:'🇰🇷',odds:'+8000', tier:'value'},
  {name:'Si Woo Kim',         country:'🇰🇷',odds:'+9000', tier:'value'},
  {name:'Patrick Reed',       country:'🇺🇸',odds:'+9000', tier:'value'},
  {name:'Jacob Bridgeman',    country:'🇺🇸',odds:'+9500', tier:'value'},
  {name:'Cameron Smith',      country:'🇦🇺',odds:'+10000',tier:'value'},
  {name:'Sepp Straka',        country:'🇦🇹',odds:'+10000',tier:'longshots'},
  {name:'Adam Scott',         country:'🇦🇺',odds:'+10000',tier:'longshots'},
  {name:'Chris Gotterup',     country:'🇺🇸',odds:'+12000',tier:'longshots'},
  {name:'Nicolai Højgaard',   country:'🇩🇰',odds:'+13000',tier:'longshots'},
  {name:'Jake Knapp',         country:'🇺🇸',odds:'+15000',tier:'longshots'},
  {name:'Max Homa',           country:'🇺🇸',odds:'+20000',tier:'longshots'},
  {name:'Bubba Watson',       country:'🇺🇸',odds:'+25000',tier:'longshots'},
  {name:'Corey Conners',      country:'🇨🇦',odds:'+25000',tier:'longshots'},
  {name:'J.T. Poston',        country:'🇺🇸',odds:'+25000',tier:'longshots'},
  {name:'Jordan Spieth',      country:'🇺🇸',odds:'+28000',tier:'longshots'},
  {name:'Keegan Bradley',     country:'🇺🇸',odds:'+30000',tier:'longshots'},
  {name:'Harris English',     country:'🇺🇸',odds:'+35000',tier:'longshots'},
  {name:'Davis Riley',        country:'🇺🇸',odds:'+35000',tier:'longshots'},
  {name:'Tom Kim',            country:'🇰🇷',odds:'+40000',tier:'longshots'},
  {name:'Michael Block',      country:'🇺🇸',odds:'+50000',tier:'longshots'},
  {name:'Y.E. Yang',          country:'🇰🇷',odds:'+200000',tier:'longshots'},
];

let tournament,participants,picks=[],draftOrder=[],currentPickIdx=0;
let activeFilter='all',searchQuery='';

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const{data,error}=await db.from('tournaments').select('*').order('created_at',{ascending:false}).limit(1).single();
    if(error||!data){
      document.getElementById('loading').style.display='none';
      document.getElementById('no-tournament').style.display='block';
      return;
    }
    tournament=data;
    document.getElementById('t-name').textContent=tournament.name;
    const{data:parts}=await db.from('participants').select('*').eq('tournament_id',tournament.id).order('draft_order',{ascending:true});
    participants=parts||[];
    const{data:pd}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=pd||[];
    buildDraftOrder();render();
    document.getElementById('loading').style.display='none';
    document.getElementById('draft-app').style.display='grid';
    document.getElementById('draft-status').style.display='flex';
    startPolling();
  }catch(e){document.getElementById('loading').textContent='Error: '+e.message;}
});

function buildDraftOrder(){
  draftOrder=[];
  const n=participants.length,pp=CONFIG.picksPerPlayer||4;
  for(let r=1;r<=pp;r++){
    const order=r%2===1?[...participants]:[...participants].reverse();
    order.forEach((p,i)=>draftOrder.push({participant:p,round:r,pickNumber:(r-1)*n+i+1}));
  }
}

function updateIdx(){
  currentPickIdx=Math.min(picks.length,draftOrder.length-1);
  if(picks.length>=draftOrder.length)currentPickIdx=draftOrder.length;
}

function render(){updateIdx();renderStatus();renderPlayerList();renderBoard();}

function renderStatus(){
  const total=draftOrder.length,made=picks.length;
  document.getElementById('ds-progress-label').textContent=`${made} of ${total} picks`;
  document.getElementById('ds-fill').style.width=(made/total*100)+'%';
  if(made<total&&currentPickIdx<total){
    const s=draftOrder[currentPickIdx];
    document.getElementById('ds-round').textContent=`Round ${s.round} of ${CONFIG.picksPerPlayer||4}`;
    document.getElementById('ds-who').textContent=s.participant.name;
  }else if(made>=total){
    document.getElementById('ds-round').textContent='Draft Complete';
    document.getElementById('ds-who').textContent='🏆 All picks made';
  }
}

function norm(n){return(n||'').toLowerCase().replace(/[^a-z\s]/g,'').trim();}
function oddsClass(t){return t==='favorites'?'odds-fav':t==='contenders'||t==='value'?'odds-mid':'odds-long';}

function renderPlayerList(){
  const picked=new Set(picks.map(p=>norm(p.golfer_name)));
  const list=document.getElementById('player-list');
  list.innerHTML='';
  const q=searchQuery.toLowerCase().trim();
  const tiers=[{id:'favorites',label:'Favorites'},{id:'contenders',label:'Contenders'},{id:'value',label:'Value Picks'},{id:'longshots',label:'Longshots'}];
  let num=0;
  tiers.forEach(tier=>{
    const players=FIELD.filter(p=>{
      if(activeFilter!=='all'&&activeFilter!=='available'&&p.tier!==activeFilter)return false;
      if(activeFilter==='available'&&picked.has(norm(p.name)))return false;
      if(q&&!p.name.toLowerCase().includes(q))return false;
      if(activeFilter==='all'||activeFilter==='available')return p.tier===tier.id;
      return p.tier===activeFilter;
    });
    if(!players.length)return;
    const lbl=document.createElement('div');lbl.className='tier-label';lbl.textContent=tier.label;list.appendChild(lbl);
    players.forEach(player=>{
      num++;
      const isPicked=picked.has(norm(player.name));
      const row=document.createElement('div');
      row.className='player-row'+(isPicked?' is-picked':'');
      row.innerHTML=`<span class="player-num">${num}</span><div class="player-info"><div class="player-name">${player.name}</div><div class="player-detail">${player.country}</div></div><span class="odds-badge ${oddsClass(player.tier)}">${player.odds}</span><button class="pick-btn ${isPicked?'done':''}" onclick="submitPick('${player.name}','${player.odds}',this)" ${isPicked?'disabled':''}>${isPicked?'✓':'+'}</button>`;
      list.appendChild(row);
    });
  });
  if(!list.children.length)list.innerHTML='<div class="panel-empty">No players match</div>';
}

function renderBoard(){
  const scroll=document.getElementById('board-scroll');
  const done=picks.length>=draftOrder.length;
  document.getElementById('board-meta').textContent=`${picks.length} / ${draftOrder.length}`;
  if(done){scroll.innerHTML=`<div class="draft-complete"><h3>🏆 Draft Complete</h3><p>All ${draftOrder.length} picks made.</p><a href="index.html" class="btn-primary">View Leaderboard →</a></div>`;return;}
  let html='',lastR=0;
  draftOrder.forEach((slot,idx)=>{
    if(slot.round!==lastR){html+=`<div class="board-round-label">Round ${slot.round}</div>`;lastR=slot.round;}
    const pick=picks.find(p=>p.participant_id===slot.participant.id&&p.round===slot.round);
    const active=idx===currentPickIdx;
    html+=`<div class="board-row ${active?'on-clock':''}"><span class="br-num">${slot.pickNumber}</span><span class="br-name ${active?'on-clock-name':''}">${slot.participant.name}</span><div class="br-pick">${pick?`<span class="br-golfer">${pick.golfer_name}</span><span class="br-odds">${getOdds(pick.golfer_name)}</span><button class="br-undo" onclick="undoPick('${pick.id}')">✕</button>`:active?`<span class="br-golfer" style="color:var(--gold);font-style:italic">On the clock…</span>`:`<span class="br-empty">—</span>`}</div></div>`;
  });
  scroll.innerHTML=html;
  const el=scroll.querySelector('.on-clock');
  if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

function getOdds(name){const p=FIELD.find(f=>norm(f.name)===norm(name));return p?p.odds:'';}

async function submitPick(golferName,odds,btn){
  if(currentPickIdx>=draftOrder.length)return;
  const slot=draftOrder[currentPickIdx];
  btn.disabled=true;btn.textContent='…';
  try{
    await db.from('picks').upsert({tournament_id:tournament.id,participant_id:slot.participant.id,golfer_name:golferName,pick_number:slot.pickNumber,round:slot.round},{onConflict:'tournament_id,participant_id,golfer_name'});
    const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=data||[];render();
  }catch(e){btn.disabled=false;btn.textContent='+';alert('Error: '+e.message);}
}

async function undoPick(pickId){
  if(!confirm('Remove this pick?'))return;
  try{
    await db.from('picks').delete().eq('id',pickId);
    const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=data||[];render();
  }catch(e){alert('Error: '+e.message);}
}

function setFilter(id,el){activeFilter=id;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderPlayerList();}
function filterPlayers(){searchQuery=document.getElementById('search-input').value;renderPlayerList();}

function startPolling(){
  setInterval(async()=>{
    const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=data||[];render();
  },8000);
}
</script>
