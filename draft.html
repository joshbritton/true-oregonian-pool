<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Draft — True Oregonian Majors Pool</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0B1F3A;--navy-mid:#152D4E;--navy-light:#1E3D68;--gold:#C5A561;
  --bg:#FAF8F3;--surface:#fff;--surface-2:#F5F1E8;
  --border:#E2DDD4;--border-2:#EDE9E0;
  --text:#1A2332;--text-2:#4A5568;--muted:#7A8A9A;
  --r:4px;--rlg:10px;
}
[data-theme="dark"]{
  --bg:#0D1829;--surface:#111E30;--surface-2:#152D4E;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.05);
  --text:rgba(255,255,255,.9);--text-2:rgba(255,255,255,.55);--muted:rgba(255,255,255,.3);
}
html,body{height:100%;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

/* ── HEADER ── */
.hdr{background:var(--navy);border-bottom:1px solid rgba(197,165,97,.2);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:sticky;top:0;z-index:200;}
.hdr-seal{width:36px;height:36px;border:1.5px solid var(--gold);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-seal-pga{font-family:'Cormorant Garamond',serif;font-size:.62rem;font-weight:700;color:var(--gold);letter-spacing:.1em;line-height:1;}
.hdr-seal-line{width:14px;height:1px;background:rgba(197,165,97,.4);margin:1.5px 0;}
.hdr-seal-year{font-family:'DM Mono',monospace;font-size:.38rem;color:rgba(197,165,97,.55);letter-spacing:.06em;}
.hdr-text{flex:1;min-width:0;}
.hdr-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:white;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.1;}
.hdr-tourn{font-size:.58rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-actions{display:flex;align-items:center;gap:4px;flex-shrink:0;}
.hdr-btn{background:none;border:none;padding:6px;cursor:pointer;display:flex;align-items:center;color:rgba(255,255,255,.4);border-radius:var(--r);}
.hdr-btn:hover{color:var(--gold);}

/* Desktop nav */
.desktop-nav{display:none;}
@media(min-width:700px){
  .desktop-nav{display:flex;align-items:stretch;}
  .desktop-nav a{display:flex;align-items:center;padding:0 16px;color:rgba(255,255,255,.38);text-decoration:none;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;border-bottom:2px solid transparent;transition:all .2s;}
  .desktop-nav a:hover{color:rgba(255,255,255,.75);}
  .desktop-nav a.active{color:var(--gold);border-bottom-color:var(--gold);}
  .hdr{padding:0 24px;}
  .hdr-seal{width:40px;height:40px;}
  .hdr-seal-pga{font-size:.7rem;}
  .hdr-seal-year{font-size:.46rem;}
  .hdr-name{font-size:1.2rem;}
  .hdr-tourn{font-size:.65rem;}
  .hdr-text{padding:14px 0;}
  .bottom-nav{display:none!important;}
}

/* ── DRAFT STATUS ── */
.dstatus{background:var(--navy-mid);padding:9px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(197,165,97,.1);flex-shrink:0;}
.ds-round{font-size:.56rem;font-weight:600;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:2px;}
.ds-clock{font-family:'Cormorant Garamond',serif;font-size:.98rem;font-weight:600;color:white;display:flex;align-items:center;gap:7px;}
.cpulse{width:6px;height:6px;background:var(--gold);border-radius:50%;animation:blink 1.2s infinite;flex-shrink:0;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.ds-prog-lbl{font-size:.54rem;color:rgba(255,255,255,.24);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;text-align:right;}
.ds-prog-bar{width:100px;height:3px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden;}
.ds-prog-fill{height:100%;background:var(--gold);border-radius:99px;transition:width .5s;}

/* ── MOBILE TABS ── */
.mtabs{background:var(--navy);border-bottom:1px solid rgba(197,165,97,.15);display:flex;flex-shrink:0;}
.mtab{flex:1;padding:11px 0;background:none;border:none;font-family:'DM Sans',sans-serif;font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:rgba(255,255,255,.32);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.mtab.active{color:var(--gold);border-bottom-color:var(--gold);}
@media(min-width:700px){.mtabs{display:none;}}

/* ── LAYOUT ── */
.draft-wrap{flex:1;display:flex;overflow:hidden;}
.field-col{flex:1;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border);}
.board-col{width:340px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;background:var(--surface);}
@media(max-width:699px){
  .board-col{display:none;}
  .board-col.show{display:flex;position:absolute;inset:0;top:57px;z-index:10;}
  .field-col.hide{display:none;}
}

/* ── SEARCH + FILTERS ── */
.search-bar{padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.search-inner{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:var(--rlg);padding:8px 12px;}
.search-icon{font-size:.82rem;opacity:.35;}
.search-inp{flex:1;border:none;background:none;font-family:'DM Sans',sans-serif;font-size:.88rem;color:var(--text);outline:none;}
.search-inp::placeholder{color:var(--muted);}
.filters{display:flex;gap:6px;padding:7px 14px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.filters::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:4px 12px;border:1px solid var(--border);border-radius:99px;font-family:'DM Sans',sans-serif;font-size:.62rem;font-weight:600;color:var(--muted);background:var(--bg);cursor:pointer;transition:all .15s;white-space:nowrap;}
.chip.active{background:var(--navy);border-color:var(--navy);color:var(--gold);}
[data-theme="dark"] .chip{background:var(--surface-2);}
[data-theme="dark"] .chip.active{background:var(--navy-mid);}

/* ── PLAYER LIST ── */
.player-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tier-lbl{padding:7px 14px 4px;font-size:.58rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10;}
.prow{display:flex;align-items:center;gap:9px;padding:9px 14px;border-bottom:1px solid var(--border-2);background:var(--surface);transition:background .1s;cursor:default;}
.prow:hover{background:var(--surface-2);}
.prow.taken{opacity:.38;pointer-events:none;}
.pnum{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);width:22px;text-align:center;flex-shrink:0;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:.86rem;font-weight:600;color:var(--text);}
.pdetail{font-size:.62rem;color:var(--muted);margin-top:1px;}
.odds{font-family:'DM Mono',monospace;font-size:.68rem;font-weight:500;padding:3px 8px;border-radius:99px;white-space:nowrap;flex-shrink:0;}
.of{background:#EEF3FF;color:var(--navy-light);}
.om{background:var(--surface-2);color:var(--text-2);}
.ol{background:var(--bg);color:var(--muted);border:1px solid var(--border);}
[data-theme="dark"] .of{background:rgba(30,61,104,.5);color:#8AABDD;}
[data-theme="dark"] .om{background:rgba(255,255,255,.06);color:rgba(255,255,255,.55);}
[data-theme="dark"] .ol{background:transparent;color:rgba(255,255,255,.3);border-color:rgba(255,255,255,.1);}
.pick-btn{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:.78rem;cursor:pointer;flex-shrink:0;color:var(--muted);transition:all .15s;font-weight:700;}
.pick-btn:hover{border-color:var(--navy);color:var(--navy);}
.pick-btn.done{background:var(--navy);border-color:var(--navy);color:var(--gold);cursor:default;}

/* ── DRAFT BOARD ── */
.board-hdr{padding:12px 16px 9px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0;}
.board-title{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--navy);}
[data-theme="dark"] .board-title{color:var(--gold);}
.board-meta{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);}
.board-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.bround{padding:4px 16px 3px;font-size:.56rem;font-weight:700;color:rgba(197,165,97,.75);text-transform:uppercase;letter-spacing:.14em;background:var(--surface-2);border-bottom:1px solid var(--border);border-top:1px solid var(--border);}
.brow{display:flex;align-items:center;gap:9px;padding:7px 16px;border-bottom:1px solid var(--border-2);}
.brow.clock{background:rgba(197,165,97,.05);}
.bnum{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);width:20px;flex-shrink:0;}
.bpname{font-size:.8rem;font-weight:600;color:var(--navy);width:80px;flex-shrink:0;}
[data-theme="dark"] .bpname{color:rgba(255,255,255,.78);}
.bpname.oc{color:var(--gold);}
.bpick{flex:1;}
.bgolfer{font-size:.8rem;font-weight:500;color:var(--text);}
.bodds{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-left:4px;}
.bempty{font-size:.72rem;color:var(--border-2);font-style:italic;}
.bundo{background:none;border:none;cursor:pointer;color:var(--muted);font-size:.68rem;padding:0 0 0 5px;opacity:.45;}
.bundo:hover{color:#e53935;opacity:1;}
.done-msg{padding:28px 18px;text-align:center;}
.done-msg h3{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:var(--navy);margin-bottom:7px;}
[data-theme="dark"] .done-msg h3{color:var(--gold);}
.done-msg p{color:var(--muted);font-size:.82rem;margin-bottom:16px;}
.btn-pri{background:var(--navy);color:var(--gold);border:1px solid rgba(197,165,97,.25);border-radius:var(--r);padding:10px 20px;font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:inline-flex;align-items:center;gap:7px;text-decoration:none;}

/* ── BOTTOM NAV ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid rgba(197,165,97,.12);display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));z-index:300;}
.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;text-decoration:none;background:none;border:none;padding:0;}
.bn-icon{width:20px;height:20px;color:rgba(255,255,255,.35);transition:color .15s;}
.bn-lbl{font-size:.52rem;font-weight:600;color:rgba(255,255,255,.28);letter-spacing:.08em;text-transform:uppercase;transition:color .15s;}
.bn-item.active .bn-icon,.bn-item.active .bn-lbl{color:var(--gold);}

/* Loading */
.load-msg{padding:60px;text-align:center;color:var(--muted);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-seal">
    <span class="hdr-seal-pga">PGA</span>
    <div class="hdr-seal-line"></div>
    <span class="hdr-seal-year">2026</span>

    <div class="hdr-tourn" id="t-name">Draft Board</div>
  </div>
  <div class="hdr-actions">
    <div class="desktop-nav">
      <a href="index.html">Leaderboard</a>

    <button class="hdr-btn" onclick="toggleDark()" id="dark-btn" title="Toggle dark mode">
      <svg id="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>

</div>

<div class="dstatus" id="dstatus" style="display:none">
  <div>
    <div class="ds-round" id="ds-round">Round —</div>

<div class="mtabs">

</div>

<div id="load-msg" class="load-msg">Loading draft...</div>
<div id="no-tourn" style="display:none;text-align:center;padding:60px 24px;color:var(--muted);font-size:.88rem">
  No tournament found. <a href="setup.html" style="color:var(--gold)">Go to Setup →</a>
</div>

<div class="draft-wrap" id="draft-wrap" style="display:none">

  <!-- Field col -->
  <div class="field-col" id="field-col">
    <div class="search-bar">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input class="search-inp" id="search" type="text" placeholder="Search player..." oninput="doSearch()"/>

    <div class="filters">
      <div class="chip active" onclick="setFilter('all',this)">All</div>
      <div class="chip" onclick="setFilter('favorites',this)">Favorites</div>
      <div class="chip" onclick="setFilter('contenders',this)">Contenders</div>
      <div class="chip" onclick="setFilter('value',this)">Value</div>
      <div class="chip" onclick="setFilter('longshots',this)">Longshots</div>
      <div class="chip" onclick="setFilter('available',this)">Available</div>

  <!-- Board col -->
  <div class="board-col" id="board-col">
    <div class="board-hdr">

      <div class="board-meta" id="board-meta">—</div>
    </div>
    <div class="board-scroll" id="board-scroll"></div>
  </div>

</div>

<!-- Bottom nav -->
<nav class="bottom-nav">
  <a class="bn-item" href="index.html">
    <svg class="bn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>

    <span class="bn-lbl">Setup</span>
  </a>
</nav>

<script>
// Dark mode
function toggleDark(){
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  document.documentElement.setAttribute('data-theme',d?'light':'dark');
  localStorage.setItem('tomp-dark',String(!d));
  document.getElementById('icon-moon').style.display=d?'block':'none';
  document.getElementById('icon-sun').style.display=d?'none':'block';
}
(function(){
  const s=localStorage.getItem('tomp-dark'),pd=window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(s==='true'||(s===null&&pd)){
    document.documentElement.setAttribute('data-theme','dark');
    document.addEventListener('DOMContentLoaded',()=>{
      const m=document.getElementById('icon-moon'),su=document.getElementById('icon-sun');
      if(m)m.style.display='none';if(su)su.style.display='block';
    });
  }
})();

// Mobile tab switch
function mTab(tab,btn){
  document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const fc=document.getElementById('field-col'),bc=document.getElementById('board-col');
  if(tab==='pick'){fc.classList.remove('hide');bc.classList.remove('show');}
  else{fc.classList.add('hide');bc.classList.add('show');}
}

  {name:'Jacob Bridgeman',    country:'🇺🇸',odds:'+9500', tier:'value'},
  {name:'Cameron Smith',      country:'🇦🇺',odds:'+10000',tier:'value'},
  {name:'Sepp Straka',        country:'🇦🇹',odds:'+10000',tier:'longshots'},
  {name:'Adam Scott',         country:'🇦🇺',odds:'+10000',tier:'longshots'},
  {name:'Chris Gotterup',     country:'🇺🇸',odds:'+12000',tier:'longshots'},
  {name:'Nicolai Højgaard',   country:'🇩🇰',odds:'+13000',tier:'longshots'},
  {name:'Jake Knapp',         country:'🇺🇸',odds:'+15000',tier:'longshots'},
  {name:'Max Homa',           country:'🇺🇸',odds:'+20000',tier:'longshots'},
  {name:'Bubba Watson',       country:'🇺🇸',odds:'+25000',tier:'longshots'},
  {name:'Corey Conners',      country:'🇨🇦',odds:'+25000',tier:'longshots'},
  {name:'J.T. Poston',        country:'🇺🇸',odds:'+25000',tier:'longshots'},
  {name:'Jordan Spieth',      country:'🇺🇸',odds:'+28000',tier:'longshots'},
  {name:'Keegan Bradley',     country:'🇺🇸',odds:'+30000',tier:'longshots'},
  {name:'Harris English',     country:'🇺🇸',odds:'+35000',tier:'longshots'},
  {name:'Davis Riley',        country:'🇺🇸',odds:'+35000',tier:'longshots'},
  {name:'Tom Kim',            country:'🇰🇷',odds:'+40000',tier:'longshots'},
  {name:'Michael Block',      country:'🇺🇸',odds:'+50000',tier:'longshots'},
  {name:'Y.E. Yang',          country:'🇰🇷',odds:'+200000',tier:'longshots'},
];

let tournament,participants=[],picks=[],draftOrder=[],idx=0,activeFilter='all',q='';

document.addEventListener('DOMContentLoaded',async()=>{
  try{
    const{data,error}=await db.from('tournaments').select('*').order('created_at',{ascending:false}).limit(1).single();
    if(error||!data){document.getElementById('load-msg').style.display='none';document.getElementById('no-tourn').style.display='block';return;}
    tournament=data;
    document.getElementById('t-name').textContent=tournament.name;
    const{data:pp}=await db.from('participants').select('*').eq('tournament_id',tournament.id).order('draft_order',{ascending:true});
    participants=pp||[];
    const{data:pk}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=pk||[];
    buildOrder();render();
    document.getElementById('load-msg').style.display='none';
    document.getElementById('draft-wrap').style.display='flex';
    document.getElementById('dstatus').style.display='flex';
    poll();
  }catch(e){document.getElementById('load-msg').textContent='Error: '+e.message;}
});

function buildOrder(){
  draftOrder=[];const n=participants.length,pp=CONFIG.picksPerPlayer||4;
  for(let r=1;r<=pp;r++){
    const ord=r%2===1?[...participants]:[...participants].reverse();
    ord.forEach((p,i)=>draftOrder.push({p,round:r,num:(r-1)*n+i+1}));
  }
}

function updateIdx(){idx=Math.min(picks.length,draftOrder.length-1);if(picks.length>=draftOrder.length)idx=draftOrder.length;}

function render(){updateIdx();renderStatus();renderList();renderBoard();}

function renderStatus(){
  const tot=draftOrder.length,made=picks.length;
  document.getElementById('ds-lbl').textContent=`${made} of ${tot} picks`;
  document.getElementById('ds-fill').style.width=(made/tot*100)+'%';
  if(made<tot&&idx<tot){const s=draftOrder[idx];document.getElementById('ds-round').textContent=`Round ${s.round} of ${CONFIG.picksPerPlayer||4}`;document.getElementById('ds-who').textContent=s.p.name;}
  else if(made>=tot){document.getElementById('ds-round').textContent='Draft Complete';document.getElementById('ds-who').textContent='All picks made';}
}

function nm(n){return(n||'').toLowerCase().replace(/[^a-z\s]/g,'').trim();}
function oc(t){return t==='favorites'?'of':t==='contenders'||t==='value'?'om':'ol';}

function renderList(){
  const taken=new Set(picks.map(p=>nm(p.golfer_name)));
  const list=document.getElementById('player-list');list.innerHTML='';
  const tiers=[{id:'favorites',lbl:'Favorites'},{id:'contenders',lbl:'Contenders'},{id:'value',lbl:'Value Picks'},{id:'longshots',lbl:'Longshots'}];
  let num=0;
  tiers.forEach(tier=>{
    const players=FIELD.filter(p=>{
      if(activeFilter!=='all'&&activeFilter!=='available'&&p.tier!==activeFilter)return false;
      if(activeFilter==='available'&&taken.has(nm(p.name)))return false;
      if(q&&!p.name.toLowerCase().includes(q))return false;
      if(activeFilter==='all'||activeFilter==='available')return p.tier===tier.id;
      return p.tier===activeFilter;
    });
    if(!players.length)return;
    const lbl=document.createElement('div');lbl.className='tier-lbl';lbl.textContent=tier.lbl;list.appendChild(lbl);
    players.forEach(player=>{
      num++;const isTaken=taken.has(nm(player.name));
      const row=document.createElement('div');row.className='prow'+(isTaken?' taken':'');
      row.innerHTML=`<span class="pnum">${num}</span><div class="pinfo"><div class="pname">${player.name}</div><div class="pdetail">${player.country}</div></div><span class="odds ${oc(player.tier)}">${player.odds}</span><button class="pick-btn ${isTaken?'done':''}" onclick="doPick('${player.name}',this)" ${isTaken?'disabled':''}>${isTaken?'✓':'+'}</button>`;
      list.appendChild(row);
    });
  });
  if(!list.children.length)list.innerHTML='<div style="padding:40px;text-align:center;color:var(--muted);font-size:.85rem">No players match</div>';
}

function renderBoard(){
  const scroll=document.getElementById('board-scroll');
  const done=picks.length>=draftOrder.length;
  document.getElementById('board-meta').textContent=`${picks.length} / ${draftOrder.length}`;
  if(done){scroll.innerHTML=`<div class="done-msg"><h3>Draft Complete</h3><p>All ${draftOrder.length} picks made.</p><a href="index.html" class="btn-pri">View Leaderboard →</a></div>`;return;}
  let html='',lr=0;
  draftOrder.forEach((slot,i)=>{
    if(slot.round!==lr){html+=`<div class="bround">Round ${slot.round}</div>`;lr=slot.round;}
    const pick=picks.find(p=>p.participant_id===slot.p.id&&p.round===slot.round);
    const active=i===idx;
    const odds=pick?FIELD.find(f=>nm(f.name)===nm(pick.golfer_name))?.odds||'':'';
    html+=`<div class="brow${active?' clock':''}"><span class="bnum">${slot.num}</span><span class="bpname${active?' oc':''}">${slot.p.name}</span><div class="bpick">${pick?`<span class="bgolfer">${pick.golfer_name}</span><span class="bodds">${odds}</span><button class="bundo" onclick="undoPick('${pick.id}')">✕</button>`:active?`<span class="bgolfer" style="color:var(--gold);font-style:italic">On the clock…</span>`:`<span class="bempty">—</span>`}</div></div>`;
  });
  scroll.innerHTML=html;
  const el=scroll.querySelector('.clock');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
}

async function doPick(name,btn){
  if(idx>=draftOrder.length)return;
  const slot=draftOrder[idx];btn.disabled=true;btn.textContent='…';
  try{
    await db.from('picks').upsert({tournament_id:tournament.id,participant_id:slot.p.id,golfer_name:name,pick_number:slot.num,round:slot.round},{onConflict:'tournament_id,participant_id,golfer_name'});
    const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=data||[];render();
  }catch(e){btn.disabled=false;btn.textContent='+';alert('Error: '+e.message);}
}

async function undoPick(id){
  if(!confirm('Remove this pick?'))return;
  try{
    await db.from('picks').delete().eq('id',id);
    const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});
    picks=data||[];render();
  }catch(e){alert('Error: '+e.message);}
}

function setFilter(id,el){activeFilter=id;document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');renderList();}
function doSearch(){q=document.getElementById('search').value;renderList();}
function poll(){setInterval(async()=>{const{data}=await db.from('picks').select('*,participants(name)').eq('tournament_id',tournament.id).order('pick_number',{ascending:true});picks=data||[];render();},8000);}
</script>
